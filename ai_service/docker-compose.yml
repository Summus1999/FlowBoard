version: "3.8"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: flowboard-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-flowboard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-flowboard_secret_2026}
      POSTGRES_DB: ${POSTGRES_DB:-flowboard_ai}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-flowboard}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: flowboard-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-flowboard_redis_2026}
    volumes:
      - redisdata:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-flowboard_redis_2026}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  ai_service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flowboard-ai
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-flowboard}:${POSTGRES_PASSWORD:-flowboard_secret_2026}@postgres:5432/${POSTGRES_DB:-flowboard_ai}
      REDIS_URL: redis://:${REDIS_PASSWORD:-flowboard_redis_2026}@redis:6379/0
    ports:
      - "0.0.0.0:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
