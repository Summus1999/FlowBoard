appId: com.flowboard.app
productName: FlowBoard
copyright: Copyright © 2026 FlowBoard
directories:
  output: dist
files:
  - index.html
  - css/**/*
  - js/**/*
  - assets/**/*
  - electron/**/*
extraResources:
  - from: "ai_service"
    to: "ai_service"
    filter:
      - "**/*"
      - "!**/__pycache__/**"
      - "!**/*.pyc"
      - "!**/*.pyo"
      - "!**/.pytest_cache/**"
      - "!**/local_data/**"
      - "!**/.venv/**"
      - "!**/venv/**"
      - "!**/python/**"
      - "!**/tests/**"
      - "!**/.git/**"
      - "!**/.mypy_cache/**"
asar: true
compression: maximum
win:
  target:
    - target: nsis
      arch:
        - x64
        - ia32
    - target: portable
      arch:
        - x64
  icon: assets/icon.ico
  publisherName: FlowBoard Team
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: assets/icon.ico
  uninstallerIcon: assets/icon.ico
  installerHeaderIcon: assets/icon.ico
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: FlowBoard
  include: build/installer.nsh
